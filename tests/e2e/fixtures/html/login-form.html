<!DOCTYPE html>
<html lang="de">
<head><meta charset="utf-8"><title>Login</title></head>
<body>
  <main>
    <form action="/login" method="POST" role="form" aria-labelledby="login-heading">
      <h1 id="login-heading">Anmelden</h1>
      <label for="email">E-Mail-Adresse</label>
      <input type="email" id="email" name="email" aria-label="E-Mail-Adresse" required>
      <label for="password">Passwort</label>
      <input type="password" id="password" name="password" aria-label="Passwort" required>
      <button type="submit">Anmelden</button>
      <a href="/register">Konto erstellen</a>
      <a href="/forgot-password">Passwort vergessen?</a>
    </form>
  </main>
</body>
</html>

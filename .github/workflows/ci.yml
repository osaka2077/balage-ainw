name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeCheck
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npx vitest run --exclude='tests/real-world/**'
